<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentinelOS v1.0 — Centre de Commandement</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   SENTINELOS — COMMAND CENTER THEME
   Dark cybersecurity dashboard with cyan accent
   ═══════════════════════════════════════════════════════════════════════ */

:root {
  --bg-deep: #060a13;
  --bg-dark: #0a0e17;
  --bg-card: #111827;
  --bg-card2: #151d2e;
  --bg-hover: #1a2540;
  --border: #1e293b;
  --border-light: #2a3a55;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --accent: #00d4ff;
  --accent2: #0ea5e9;
  --accent-glow: rgba(0, 212, 255, 0.15);
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --orange: #f59e0b;
  --orange-dim: rgba(245, 158, 11, 0.15);
  --purple: #a855f7;
  --netguard: #4d9fff;
  --cleanguard: #ffb347;
  --mailshield: #3dffb4;
  --vpnguard: #00d4ff;
  --honeypot: #ff6b6b;
  --fim: #a855f7;
  --strikeback: #ff3d3d;
  --recorder: #60a5fa;
  --yellow: #f59e0b;
  --sidebar-w: 240px;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  display: flex;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-dark); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; z-index: 10;
}
.sidebar-logo { padding: 20px 16px; text-align: center; border-bottom: 1px solid var(--border); }
.sidebar-logo h1 {
  font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px;
}
.sidebar-logo .version { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.nav-section {
  font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted);
  padding: 12px 12px 6px; letter-spacing: 1.5px; font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text-dim);
  font-size: 0.85rem; transition: all 0.15s; margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
.nav-item .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }
.nav-item .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
.status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.offline { background: var(--red); }
.status-dot.unknown { background: var(--text-muted); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); text-align: center; }
.threat-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
}
.threat-badge.safe { background: var(--green-dim); color: var(--green); }
.threat-badge.warning { background: var(--orange-dim); color: var(--orange); }
.threat-badge.danger { background: var(--red-dim); color: var(--red); }

/* ═══ MAIN ═══ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; background: var(--bg-dark);
}
.topbar-title { font-size: 1.1rem; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: var(--text-dim); }
.connection-status { display: flex; align-items: center; gap: 6px; }
.connection-status .dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.disconnected { background: var(--red); }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ═══ LAUNCH BAR ═══ */
.launch-bar {
  display: flex; gap: 8px; padding: 10px 24px; background: var(--bg-dark);
  border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap;
}
.launch-chip {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  border-radius: 20px; border: 1px solid var(--border); cursor: pointer;
  font-size: 0.78rem; font-weight: 600; background: var(--bg-card);
  transition: all 0.2s; white-space: nowrap; user-select: none;
}
.launch-chip:hover { border-color: var(--accent); background: var(--bg-hover); }
.launch-chip .chip-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.launch-chip .chip-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.launch-chip .chip-dot.off { background: var(--text-muted); }
.launch-chip.running { border-color: var(--green); background: rgba(34,197,94,0.08); }
.launch-chip .chip-action {
  padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 700;
  border: none; cursor: pointer; transition: all 0.15s;
}
.launch-chip .chip-action.start-btn { background: var(--green-dim); color: var(--green); }
.launch-chip .chip-action.start-btn:hover { background: var(--green); color: #000; }
.launch-chip .chip-action.stop-btn { background: var(--red-dim); color: var(--red); }
.launch-chip .chip-action.stop-btn:hover { background: var(--red); color: #fff; }
.launch-chip .chip-action.open-btn { background: var(--accent-glow); color: var(--accent); }
.launch-chip .chip-action.open-btn:hover { background: var(--accent); color: #000; }
.tab-page { display: none; }
.tab-page.active { display: block; }

/* Language selector */
.lang-switch {
  display: flex; gap: 2px; background: var(--bg-card); border-radius: 6px; padding: 2px;
  border: 1px solid var(--border);
}
.lang-btn {
  padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 0.75rem; font-weight: 600; background: transparent; color: var(--text-dim);
  transition: all 0.15s;
}
.lang-btn.active { background: var(--accent); color: #000; }
.lang-btn:hover:not(.active) { color: var(--text); }

/* ═══ CARDS & GRIDS ═══ */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
}
.card-title {
  font-size: 0.85rem; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* ═══ OVERVIEW ═══ */
.overview-top { display: grid; grid-template-columns: 260px 1fr; gap: 20px; margin-bottom: 20px; }
.threat-gauge { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.gauge-circle { position: relative; width: 170px; height: 170px; }
.gauge-circle svg { transform: rotate(-90deg); width: 170px; height: 170px; }
.gauge-bg { fill: none; stroke: var(--border); stroke-width: 12; }
.gauge-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s ease, stroke 0.5s; }
.gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.gauge-score { font-size: 2.5rem; font-weight: 700; line-height: 1; }
.gauge-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
.gauge-grade { font-size: 1rem; font-weight: 600; margin-top: 10px; padding: 4px 20px; border-radius: 20px; }
/* Agent mosaic — compact combined view */
.agent-mosaic { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.agent-tile {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
}
.agent-tile:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.agent-tile.online { border-left: 3px solid var(--green); }
.agent-tile.offline { border-left: 3px solid var(--text-muted); opacity: 0.7; }
.agent-tile .tile-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.agent-tile .tile-icon { font-size: 1.5rem; }
.agent-tile .tile-name { font-size: 0.8rem; font-weight: 700; }
.agent-tile .tile-status { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.agent-tile .tile-stats { display: flex; gap: 8px; font-size: 0.65rem; color: var(--text-muted); }
.agent-tile .tile-stat-val { font-weight: 700; color: var(--text); }
/* Stats bar */
.stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
/* Mini graph bars */
.mini-bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 50px; padding: 4px 0; }
.mini-bar { flex: 1; min-width: 4px; border-radius: 2px 2px 0 0; transition: height 0.3s; }
/* Activity graph */
.activity-graph { display: flex; align-items: flex-end; gap: 2px; height: 80px; padding: 8px 0; }
.activity-bar { flex: 1; min-width: 3px; border-radius: 2px 2px 0 0; opacity: 0.8; transition: height 0.4s; }
.activity-bar:hover { opacity: 1; }
/* Two-column layout */
.overview-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
/* Agent badges for overview (legacy compat) */
.agent-card-mini {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s;
}
.agent-card-mini:hover { border-color: var(--accent); background: var(--bg-hover); }
.agent-icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
}
.agent-info { flex: 1; min-width: 0; }
.agent-info h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
.agent-info .desc { font-size: 0.72rem; color: var(--text-muted); }
.agent-status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
.agent-status-badge.online { background: var(--green-dim); color: var(--green); }
.agent-status-badge.offline { background: var(--red-dim); color: var(--red); }

/* ═══ AGENTS TAB ═══ */
.agent-card-full { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.agent-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.agent-card-header h3 { font-size: 1rem; font-weight: 600; }
.agent-card-header .port { font-size: 0.75rem; color: var(--text-muted); }
.agent-metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 14px; }
.metric { text-align: center; padding: 8px; background: var(--bg-card2); border-radius: var(--radius-sm); }
.metric-value { font-size: 1.1rem; font-weight: 600; }
.metric-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
.agent-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ═══ TIMELINE ═══ */
.timeline-container { max-height: calc(100vh - 200px); overflow-y: auto; }
.timeline-event { display: flex; gap: 12px; padding: 12px 16px; border-left: 3px solid var(--border); margin-left: 8px; margin-bottom: 4px; transition: background 0.15s; }
.timeline-event:hover { background: var(--bg-card2); }
.timeline-event.severity-warning { border-left-color: var(--orange); }
.timeline-event.severity-critical { border-left-color: var(--red); }
.timeline-event.severity-info { border-left-color: var(--accent); }
.timeline-time { font-size: 0.7rem; color: var(--text-muted); min-width: 70px; flex-shrink: 0; }
.timeline-source { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
.timeline-content { flex: 1; font-size: 0.82rem; min-width: 0; }
.timeline-channel { font-size: 0.68rem; color: var(--text-muted); font-family: monospace; }
.factor-list { list-style: none; padding: 0; }
.factor-list li { padding: 6px 12px; font-size: 0.82rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
.factor-list li::before { content: "\26A0"; font-size: 0.75rem; }

/* ═══ BUTTONS ═══ */
.btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card2); color: var(--text); font-size: 0.8rem; cursor: pointer;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: var(--accent2); }
.btn-green { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }
.btn-red { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.3); }
.btn-orange { background: var(--orange-dim); color: var(--orange); border-color: rgba(245,158,11,0.3); }
.btn-sm { padding: 5px 12px; font-size: 0.75rem; }

/* ═══ SETTINGS ═══ */
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
.setting-label { font-size: 0.85rem; }
.setting-desc { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; transition: 0.2s; }
.toggle .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .slider { background: var(--accent); }
.toggle input:checked + .slider::before { transform: translateX(20px); }

/* ═══ CHAT ═══ */
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 140px); }
.chat-agent-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.chat-agent-tab {
  padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.82rem; font-weight: 600; border: 1px solid var(--border);
  background: var(--bg-card); transition: all 0.15s;
}
.chat-agent-tab:hover { background: var(--bg-hover); }
.chat-agent-tab.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-bubble {
  max-width: 80%; padding: 12px 16px; border-radius: 16px;
  font-size: 0.85rem; line-height: 1.5; animation: bubbleIn 0.2s ease;
}
@keyframes bubbleIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-bubble.agent {
  align-self: flex-start; background: var(--bg-card2); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-bubble.user {
  align-self: flex-end; background: var(--accent-glow); border: 1px solid rgba(0,212,255,0.3);
  border-bottom-right-radius: 4px; color: var(--accent);
}
.chat-bubble .bubble-header {
  font-size: 0.7rem; font-weight: 600; margin-bottom: 4px; opacity: 0.7;
}
.chat-bubble .bubble-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; text-align: right; }
.chat-suggestions {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.chat-suggestion {
  padding: 5px 12px; border-radius: 16px; font-size: 0.72rem; cursor: pointer;
  background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-dim);
  transition: all 0.15s;
}
.chat-suggestion:hover { border-color: var(--accent); color: var(--accent); }
.chat-input-row {
  display: flex; gap: 8px; padding: 12px;
  background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
}
.chat-input {
  flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: 20px;
  background: var(--bg-card2); color: var(--text); font-size: 0.85rem; outline: none;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  padding: 10px 20px; border: none; border-radius: 20px;
  background: var(--accent); color: #000; font-weight: 600; font-size: 0.85rem;
  cursor: pointer; transition: background 0.15s;
}
.chat-send:hover { background: var(--accent2); }

/* ═══ HELP ═══ */
.help-section { margin-bottom: 20px; }
.help-section h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--accent); }
.help-section p, .help-section li { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
.help-section ul { padding-left: 20px; }

/* ═══ NOTIF ═══ */
.notif-bar { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.notif { padding: 12px 20px; border-radius: var(--radius-sm); font-size: 0.82rem; animation: notifIn 0.3s ease; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.notif.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.notif.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.notif.info { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
@keyframes notifIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 1100px) {
  .grid-4, .stats-row { grid-template-columns: 1fr 1fr; }
  .agent-metrics { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 800px) {
  .overview-header, .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* ═══ NEW TABS: Honeypot, FIM, SOAR, Intel, Alerts ═══ */
.config-form { display: flex; flex-direction: column; gap: 12px; }
.config-row { display: flex; align-items: center; gap: 12px; }
.config-row label { min-width: 120px; font-size: 0.82rem; color: var(--text-dim); }
.config-input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card2); color: var(--text); font-size: 0.82rem; outline: none;
}
.config-input:focus { border-color: var(--accent); }
.playbook-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-bottom: 1px solid var(--border); transition: background 0.15s;
}
.playbook-item:hover { background: var(--bg-card2); }
.playbook-item .playbook-name { flex: 1; font-size: 0.85rem; font-weight: 600; }
.playbook-item .playbook-desc { font-size: 0.72rem; color: var(--text-muted); }
.intel-feed { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.intel-feed .feed-name { font-size: 0.82rem; font-weight: 600; flex: 1; }
.intel-feed .feed-count { font-size: 0.75rem; color: var(--accent); }
.honeypot-trap {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.honeypot-trap .trap-name { font-size: 0.82rem; font-weight: 600; flex: 1; }
.honeypot-trap .trap-hits { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
.fim-entry { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.fim-entry .fim-path { font-family: monospace; font-size: 0.78rem; flex: 1; color: var(--text-dim); }
.fim-entry .fim-status { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.log-entry { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 0.78rem; font-family: monospace; color: var(--text-dim); }

// ═══════════════════════════════════════════════════════════
// CONNECTION (pywebview + WebSocket)
// ═══════════════════════════════════════════════════════════

function isPywebview() { return !!(window.pywebview && window.pywebview.api); }

function sendCmd(cmdObj) {
  if (isPywebview()) {
    const cmd = cmdObj.cmd;
    const api = window.pywebview.api;
    if (cmd === 'get_state' && api.get_global_state) api.get_global_state().then(r => handleMsg(JSON.parse(r)));
    else if (cmd === 'get_agent_state' && api.get_agent_state) api.get_agent_state(cmdObj.agent).then(r => handleMsg(JSON.parse(r)));
    else if (cmd === 'start_agent') api.start_agent(cmdObj.agent).then(r => handleResult(r));
    else if (cmd === 'stop_agent') api.stop_agent(cmdObj.agent).then(r => handleResult(r));
    else if (cmd === 'restart_agent') api.restart_agent(cmdObj.agent).then(r => handleResult(r));
    else if (cmd === 'open_agent_window' && api.open_agent_window) api.open_agent_window(cmdObj.agent).then(r => handleResult(r));
    else if (cmd === 'send_agent_command') api.send_agent_command(cmdObj.agent, cmdObj.agent_cmd, JSON.stringify(cmdObj.params||{})).then(r => handleResult(r));
    else if (cmd === 'get_threat_level') api.get_threat_level().then(r => handleMsg(JSON.parse(r)));
    else if (cmd === 'get_timeline') api.get_timeline(cmdObj.limit||100).then(r => handleMsg({type:'timeline',events:JSON.parse(r)}));
    else if (cmd === 'get_alerts') api.get_alerts(cmdObj.limit||50).then(r => handleMsg({type:'alerts',alerts:JSON.parse(r)}));
    else if (cmd === 'get_settings') api.get_settings().then(r => handleMsg({type:'settings',...JSON.parse(r)}));
    else if (cmd === 'save_settings') api.save_settings(JSON.stringify(cmdObj.settings||{})).then(r => handleResult(r));
    else if (cmd === 'get_diagnostics') api.get_diagnostics().then(r => handleMsg({type:'diagnostics',...JSON.parse(r)}));
    else if (cmd === 'chat_message') {
      if (api.chat_message) api.chat_message(cmdObj.agent, cmdObj.message, currentLang).then(r => handleMsg(JSON.parse(r)));
    }
    else if (cmd === 'chat_advice') {
      if (api.chat_advice) api.chat_advice(cmdObj.agent, currentLang).then(r => handleMsg(JSON.parse(r)));
    }
    else if (cmd === 'get_playbooks' && api.get_playbooks) api.get_playbooks(currentLang).then(r => handleMsg({type:'playbooks',playbooks:JSON.parse(r)}));
    else if (cmd === 'toggle_playbook' && api.toggle_playbook) api.toggle_playbook(cmdObj.playbook_id).then(r => handleResult(r));
    else if (cmd === 'get_playbook_log' && api.get_playbook_log) api.get_playbook_log(cmdObj.limit||50).then(r => handleMsg({type:'playbook_log',log:JSON.parse(r)}));
    else if (cmd === 'get_threat_intel' && api.get_threat_intel_stats) api.get_threat_intel_stats().then(r => handleMsg({type:'threat_intel',...JSON.parse(r)}));
    else if (cmd === 'check_ip' && api.check_ip_reputation) api.check_ip_reputation(cmdObj.ip).then(r => handleMsg({type:'ip_check_result',...JSON.parse(r)}));
    else if (cmd === 'update_threat_feeds' && api.update_threat_feeds) api.update_threat_feeds().then(r => handleResult(r));
    else if (cmd === 'get_alert_config' && api.get_alert_config) api.get_alert_config().then(r => handleMsg({type:'alert_config',...JSON.parse(r)}));
    else if (cmd === 'update_alert_config' && api.update_alert_config) api.update_alert_config(JSON.stringify(cmdObj.config||{})).then(r => handleResult(r));
    else if (cmd === 'test_telegram' && api.test_telegram) api.test_telegram().then(r => handleResult(r));
    else if (cmd === 'test_discord' && api.test_discord) api.test_discord().then(r => handleResult(r));
    else if (cmd === 'get_alert_log' && api.get_alert_log) api.get_alert_log(cmdObj.limit||50).then(r => handleMsg({type:'alert_log',log:JSON.parse(r)}));
    else if (cmd === 'strikeback_isolate') sendCmd({cmd:'send_agent_command', agent:'strikeback', agent_cmd:'isolate_ip', params:{ip:cmdObj.ip}});
    else if (cmd === 'recorder_start_incident') sendCmd({cmd:'send_agent_command', agent:'recorder', agent_cmd:'start_incident', params:{}});
    else if (cmd === 'recorder_stop_incident') sendCmd({cmd:'send_agent_command', agent:'recorder', agent_cmd:'stop_incident', params:{}});
    else if (cmd === 'recorder_generate_report') sendCmd({cmd:'send_agent_command', agent:'recorder', agent_cmd:'generate_report', params:{}});
  } else if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify(cmdObj));
  }
}

function handleResult(r) {
  try {
    const data = typeof r === 'string' ? JSON.parse(r) : r;
    if (data.error) showNotif(data.error, 'error');
    else if (data.success) { showNotif(t('settings.saved'), 'success'); setTimeout(() => sendCmd({cmd:'get_state'}), 500); }
  } catch(e) {}
}

let wsReconnectTimer = null;
let wsRetryDelay = 5000;
const WS_MAX_RETRY = 30000;

function connectWS() {
  if (isPywebview()) { setConnectionStatus(true); sendCmd({cmd:'get_state'}); return; }
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  if (ws && (ws.readyState === 0 || ws.readyState === 1)) return; // already connecting/open
  try {
    ws = new WebSocket(`ws://localhost:${WS_PORT}`);
    ws.onopen = () => {
      setConnectionStatus(true);
      wsRetryDelay = 5000; // reset backoff
      sendCmd({cmd:'get_state'});
    };
    ws.onmessage = (e) => { try { handleMsg(JSON.parse(e.data)); } catch(err) {} };
    ws.onclose = () => {
      setConnectionStatus(false);
      // Reconnect with backoff — only if not pywebview
      if (!isPywebview()) {
        wsReconnectTimer = setTimeout(connectWS, wsRetryDelay);
        wsRetryDelay = Math.min(wsRetryDelay + 5000, WS_MAX_RETRY);
      }
    };
    ws.onerror = () => {};
  } catch(e) {}
}

function setConnectionStatus(connected) {
  wsConnected = connected;
  document.getElementById('ws-dot').className = 'dot ' + (connected ? 'connected' : 'disconnected');
  document.getElementById('ws-label').textContent = connected ? t('ws.connected') : t('ws.disconnected');
}

// ═══════════════════════════════════════════════════════════
// MESSAGE HANDLER
// ═══════════════════════════════════════════════════════════

function handleMsg(msg) {
  if (!msg) return;
  const tp = msg.type;
  if (tp === 'global_state') { globalState = msg; renderAll(); }
  else if (tp === 'diagnostics') renderDiagnostics(msg);
  else if (tp === 'settings') applySettings(msg);
  else if (tp === 'chat_response') handleChatResponse(msg);
  else if (tp === 'playbooks') applyPlaybooks(msg);
  else if (tp === 'playbook_log') applyPlaybookLog(msg);
  else if (tp === 'threat_intel') applyThreatIntel(msg);
  else if (tp === 'ip_check_result') applyIPCheckResult(msg);
  else if (tp === 'alert_config') applyAlertConfig(msg);
  else if (tp === 'alert_test_result') {
    showNotif(msg.success ? t('alerts.test_sent') : t('alerts.test_failed'), msg.success ? 'success' : 'error');
  }
}

function getScoreColor(score) {
  if (score <= 10) return '#22c55e';
  if (score <= 25) return '#84cc16';
  if (score <= 50) return '#f59e0b';
  if (score <= 75) return '#f97316';
  return '#ef4444';
}

function renderTimelineEvents(container, events) {
  if (!container) return;
  if (!events?.length) { container.innerHTML = `<div style="color:var(--text-muted);font-size:0.82rem;padding:20px;text-align:center">${t('overview.no_events')}</div>`; return; }
  container.innerHTML = [...events].reverse().map(e => {
    const color = AGENT_COLORS[e.source] || 'var(--accent)';
    const data = e.data || {};
    let desc = e.channel || '';
    if (data.count !== undefined) desc += ` (${data.count})`;
    if (data.agent) desc += ` [${data.agent}]`;
    if (data.connected !== undefined) desc += data.connected ? ` ${t('status.connected')}` : ` ${t('status.disconnected')}`;
    return `<div class="timeline-event severity-${e.severity||'info'}">
      <span class="timeline-time">${formatTime(e.ts)}</span>
      <span class="timeline-source" style="background:${color}22;color:${color}">${e.source||'?'}</span>
      <div class="timeline-content">${desc}<div class="timeline-channel">${e.channel||''}</div></div>
    </div>`;
  }).join('');
}

function updateSidebarDots(state) {
  const agents = state.agents || {};

}

function renderChatPage() {
  let el = document.getElementById('tab-chat');
  if (!el) {
    const content = document.getElementById('content-area');
    el = document.createElement('div'); el.id = 'tab-chat';
    el.className = 'tab-page' + (currentTab==='chat'?' active':'');
    content.appendChild(el);
  }
  const suggestions = [1,2,3,4].map(i => t(`chat.suggest.${chatAgent}.${i}`));
  el.innerHTML = `
    <div class="chat-container">
      <div class="chat-agent-tabs">
        ${AGENT_KEYS.map(k => `<div class="chat-agent-tab ${chatAgent===k?'active':''}" style="${chatAgent===k?'border-color:'+AGENT_COLORS[k]+';color:'+AGENT_COLORS[k]:''}" onclick="selectChatAgent('${k}')">
          ${AGENT_ICONS[k]} ${k.charAt(0).toUpperCase()+k.slice(1)}
        </div>`).join('')}
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-top:none">
        <div class="chat-suggestions" id="chat-suggestions">
          ${suggestions.map(s => `<span class="chat-suggestion" onclick="sendChatMsg('${s.replace(/'/g,"\\'")}')">&#128172; ${s}</span>`).join('')}
        </div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="${t('chat.placeholder')}" onkeydown="if(event.key==='Enter')sendChatFromInput()">
        <button class="chat-send" onclick="sendChatFromInput()">${t('action.send')}</button>
      </div>
    </div>`;
  renderChatMessages();
}

function selectChatAgent(key) {
  chatAgent = key;
  // Add greeting if no history
  if (!chatHistory[key].length) {
    const name = key.charAt(0).toUpperCase() + key.slice(1) + ' Pro';
    chatHistory[key].push({
      role: 'agent', text: t('chat.greeting').replace('{agent}', name), ts: Date.now()
    });
  }
  renderChatPage();
  // Request auto-advice
  sendCmd({cmd: 'chat_advice', agent: key, lang: currentLang});
}

function sendChatFromInput() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim()) return;
  sendChatMsg(input.value.trim());
  input.value = '';
}

function sendChatMsg(text) {
  chatHistory[chatAgent].push({role: 'user', text, ts: Date.now()});
  renderChatMessages();
  sendCmd({cmd: 'chat_message', agent: chatAgent, message: text, lang: currentLang});
}

function handleChatResponse(msg) {
  const agent = msg.agent || chatAgent;
  chatHistory[agent].push({
    role: 'agent', text: msg.message || '...', ts: Date.now(), suggestions: msg.suggestions
  });
  if (agent === chatAgent) renderChatMessages();
}

function renderChatMessages() {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  const msgs = chatHistory[chatAgent] || [];
  if (!msgs.length) {
    el.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:40px">${t('chat.no_agent')}</div>`;
    return;
  }
  const color = AGENT_COLORS[chatAgent];
  el.innerHTML = msgs.map(m => {
    const time = new Date(m.ts).toLocaleTimeString(currentLang==='fr'?'fr-FR':'en-US', {hour:'2-digit',minute:'2-digit'});
    if (m.role === 'agent') {
      return `<div class="chat-bubble agent">
        <div class="bubble-header" style="color:${color}">${AGENT_ICONS[chatAgent]} ${chatAgent.charAt(0).toUpperCase()+chatAgent.slice(1)} Pro</div>
        ${m.text}
        ${m.suggestions?`<div class="chat-suggestions">${m.suggestions.map(s=>`<span class="chat-suggestion" onclick="sendChatMsg('${s.replace(/'/g,"\\'")}')">&#128172; ${s}</span>`).join('')}</div>`:''}
        <div class="bubble-time">${time}</div>
      </div>`;
    }
    return `<div class="chat-bubble user"><div class="bubble-header">Vous</div>${m.text}<div class="bubble-time">${time}</div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

  const attackers = sb.tracked_attackers || [];
  const stats = sb.stats || {};
  const timeline = sb.timeline || [];
  const connected = globalState?.agents?.strikeback?.connected || false;

  el.innerHTML = `
    <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card"><div class="stat-value" style="color:var(--strikeback)">${stats.total_attackers||0}</div><div class="stat-label">${currentLang==='fr'?'Attaquants suivis':'Tracked attackers'}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--orange)">${tarpit.connections_slowed||0}</div><div class="stat-label">${currentLang==='fr'?'Connexions ralenties':'Connections slowed'}</div></div>
      <div class="stat-card"><div class="stat-value">${decoys.length}</div><div class="stat-label">${currentLang==='fr'?'Leurres actifs':'Active decoys'}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--red)">${stats.total_isolated||0}</div><div class="stat-label">${currentLang==='fr'?'IPs isolees':'IPs isolated'}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${connected?'var(--green)':'var(--red)'}">${connected?'\u{2705}':'\u{274C}'}</div><div class="stat-label">Status</div></div>
    </div>
    <div class="overview-cols">
      <div class="card">
        <div class="card-title">\u{2694} ${currentLang==='fr'?'Attaquants profiles':'Profiled attackers'}</div>
        ${attackers.length === 0 ? '<div style="color:var(--text-muted);padding:16px">'+( currentLang==='fr'?'Aucun attaquant detecte':'No attackers detected')+'</div>' :
          attackers.slice(-10).reverse().map(a => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border)">
              <span style="font-size:1.2rem">${a.danger_score>=70?'\u{1F534}':a.danger_score>=40?'\u{1F7E0}':'\u{1F7E2}'}</span>
              <div style="flex:1">
                <div style="font-weight:600;font-size:0.85rem">${a.ip} <span style="color:var(--text-muted);font-size:0.7rem">${a.reverse_dns||''}</span></div>
                <div style="font-size:0.7rem;color:var(--text-muted)">${a.type||'unknown'} \u{2022} ${a.attacks||0} attacks \u{2022} ${a.country||'??'}</div>
              </div>
              <span style="font-weight:700;color:${a.danger_score>=70?'var(--red)':a.danger_score>=40?'var(--orange)':'var(--green)'}">${a.danger_score||0}</span>
              ${!a.isolated ? '<button class="btn btn-red btn-sm" onclick="sendCmd({cmd:\'strikeback_isolate\',ip:\''+a.ip+'\'})">Block</button>' : '<span style="color:var(--red);font-size:0.7rem">\u{1F6AB} Blocked</span>'}
            </div>
          `).join('')
        }
      </div>
      <div class="card">
        <div class="card-title">\u{1F3AF} ${currentLang==='fr'?'Leurres deployes':'Deployed decoys'}</div>
        ${decoys.map(d => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border)">
            <span style="font-size:1.2rem">\u{1F4E1}</span>
            <div style="flex:1">
              <div style="font-weight:600;font-size:0.85rem">Port ${d.port} — ${d.service}</div>
              <div style="font-size:0.7rem;color:var(--text-muted)">${d.connections||0} connections</div>
            </div>
            <span class="tile-status" style="background:var(--green-dim);color:var(--green)">Active</span>
          </div>
        `).join('')}
        ${decoys.length===0?'<div style="color:var(--text-muted);padding:16px">'+(currentLang==='fr'?'Aucun leurre':'No decoys')+'</div>':''}
      </div>
    </div>
    <div class="card">
      <div class="card-title">\u{26A1} ${currentLang==='fr'?'Timeline des actions':'Action timeline'}</div>
      <div class="timeline-container" style="max-height:300px" id="strikeback-timeline"></div>
    </div>
  `;
  renderTimelineEvents(document.getElementById('strikeback-timeline'), timeline.slice(-20));
}

// ═══════════════════════════════════════════════════════════
// RECORDER TAB
// ═══════════════════════════════════════════════════════════

function renderRecorder() {
  let el = document.getElementById('tab-recorder');
  if (!el) {
    const content = document.getElementById('content-area');
    el = document.createElement('div'); el.id = 'tab-recorder';
    el.className = 'tab-page' + (currentTab==='recorder'?' active':'');
    content.appendChild(el);
  }
  const rc = globalState?.agents?.recorder?.state || {};
  const recording = rc.recording || {};
  const monitors = rc.monitors || {};
  const incident = rc.current_incident;
  const events = rc.recent_events || [];
  const reports = rc.reports || [];
  const stats = rc.stats || {};
  const connected = globalState?.agents?.recorder?.connected || false;
  const isIncident = rc.mode === 'incident';

  el.innerHTML = `
    <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-card"><div class="stat-value" style="color:var(--recorder)">${recording.events_recorded||0}</div><div class="stat-label">${currentLang==='fr'?'Evenements enregistres':'Events recorded'}</div></div>
      <div class="stat-card"><div class="stat-value">${monitors.processes?.current_count||0}</div><div class="stat-label">${currentLang==='fr'?'Processus actifs':'Active processes'}</div></div>
      <div class="stat-card"><div class="stat-value">${monitors.sessions?.total_logged||0}</div><div class="stat-label">${currentLang==='fr'?'Sessions reseau':'Network sessions'}</div></div>
      <div class="stat-card"><div class="stat-value">${monitors.files?.changes_detected||0}</div><div class="stat-label">${currentLang==='fr'?'Changements fichiers':'File changes'}</div></div>
      <div class="stat-card"><div class="stat-value">${(recording.storage_used_mb||0).toFixed(1)} MB</div><div class="stat-label">Storage</div></div>
    </div>
    <div class="card" style="border-color:${isIncident?'var(--red)':'var(--border)'}">
      <div class="card-title">${isIncident?'\u{1F534}':'\u{1F7E2}'} ${currentLang==='fr'?'Mode d\'enregistrement':'Recording mode'}</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="font-size:1.5rem;font-weight:700;color:${isIncident?'var(--red)':'var(--green)'}">${isIncident?(currentLang==='fr'?'MODE INCIDENT':'INCIDENT MODE'):(currentLang==='fr'?'Surveillance normale':'Normal monitoring')}</div>
        <button class="btn ${isIncident?'btn-green':'btn-red'}" onclick="sendCmd({cmd:'recorder_${isIncident?'stop':'start'}_incident'})">
          ${isIncident?(currentLang==='fr'?'\u{23F9} Arreter l\'incident':'\u{23F9} Stop incident'):(currentLang==='fr'?'\u{23FA} Demarrer un incident':'\u{23FA} Start incident')}
        </button>
        <button class="btn" onclick="sendCmd({cmd:'recorder_generate_report'})">
          \u{1F4CB} ${currentLang==='fr'?'Generer rapport':'Generate report'}
        </button>
      </div>
      ${incident ? '<div style="margin-top:12px;padding:12px;background:var(--red-dim);border-radius:8px;color:var(--red)"><b>Incident '+incident.id+'</b> — '+incident.events+' events recorded</div>' : ''}
    </div>
    <div class="overview-cols">
      <div class="card">
        <div class="card-title">\u{1F4DD} ${currentLang==='fr'?'Evenements recents':'Recent events'}</div>
        <div style="max-height:300px;overflow-y:auto">
          ${events.length === 0 ? '<div style="color:var(--text-muted);padding:16px">'+(currentLang==='fr'?'En attente...':'Waiting...')+'</div>' :
            events.slice(-15).reverse().map(e => `
              <div style="display:flex;gap:10px;padding:8px;border-bottom:1px solid var(--border);font-size:0.78rem">
                <span style="color:${e.severity==='critical'?'var(--red)':e.severity==='warning'?'var(--orange)':'var(--text-muted)'}">\u{25CF}</span>
                <span style="color:var(--text-dim)">${formatTime(e.ts)}</span>
                <span style="flex:1">${e.message||e.type||'event'}</span>
                <span style="color:var(--text-muted)">${e.source||''}</span>
              </div>
            `).join('')
          }
        </div>
      </div>
      <div class="card">
        <div class="card-title">\u{1F4CB} ${currentLang==='fr'?'Rapports generes':'Generated reports'}</div>
        ${reports.length === 0 ? '<div style="color:var(--text-muted);padding:16px">'+(currentLang==='fr'?'Aucun rapport':'No reports')+'</div>' :
          reports.map(r => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border)">
              <span style="font-size:1.2rem">\u{1F4C4}</span>
              <div style="flex:1">
                <div style="font-weight:600;font-size:0.85rem">${r.id}</div>
                <div style="font-size:0.7rem;color:var(--text-muted)">${r.events_count} events \u{2022} ${r.size_kb||0} KB</div>
              </div>
              <span style="font-size:0.7rem;color:var(--text-muted)">${formatTime(r.created)}</span>
            </div>
          `).join('')
        }
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════

function agentAction(action, key) {
  sendCmd({cmd: action+'_agent', agent: key});
  showNotif(`${action==='start'?t('action.start'):action==='stop'?t('action.stop'):t('action.restart')} ${key}...`, 'info');
}
function sendAgentCmd(agent, cmd, params) { sendCmd({cmd:'send_agent_command', agent, agent_cmd: cmd, params: params||{}}); }
function openAgentDashboard(key, port) {
  // Open agent in its own independent window
  const mainAgents = ['netguard', 'cleanguard', 'mailshield', 'vpnguard'];
  if (mainAgents.includes(key)) {
    sendCmd({cmd: 'open_agent_window', agent: key});
    showNotif(key + ' — ouverture...', 'info');
  } else {
    switchTab(key);
  }
}
function launchOpen(key, port) {
  const tabOnly = ['honeypot', 'fim', 'strikeback', 'recorder'];
  if (tabOnly.includes(key)) { switchTab(key); }
  else { openAgentDashboard(key, port); }
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

function formatNum(n) { if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }
function formatBytes(b) { if (b>=1073741824) return (b/1073741824).toFixed(1)+' GB'; if (b>=1048576) return (b/1048576).toFixed(1)+' MB'; if (b>=1024) return (b/1024).toFixed(1)+' KB'; return b+' B'; }
function formatUptime(s) { if (s<60) return Math.floor(s)+'s'; if (s<3600) return Math.floor(s/60)+'min'; const h=Math.floor(s/3600); const m=Math.floor((s%3600)/60); return h+'h'+(m>0?m+'min':''); }
function formatTime(ts) { if (!ts) return '--:--'; const d=new Date(ts*1000); return d.toLocaleTimeString(currentLang==='fr'?'fr-FR':'en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function showNotif(text, type) {
  const bar=document.getElementById('notif-bar'); const el=document.createElement('div');
  el.className='notif '+(type||'info'); el.textContent=text; bar.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},4000);
}

// Clock
setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(currentLang==='fr'?'fr-FR':'en-US'); }, 1000);

// Auto-refresh (8s for smoother performance)
setInterval(() => { if (wsConnected || isPywebview()) sendCmd({cmd:'get_state'}); }, 12000);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

// Set initial language
document.getElementById('lang-fr').classList.toggle('active', currentLang === 'fr');
document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');

// Initial render (empty state)
renderAll();

// Auto-init greeting for default chat agent
selectChatAgent(chatAgent);

// Connect
if (isPywebview()) {
  if (window.pywebview?.api) connectWS();
  else window.addEventListener('pywebviewready', connectWS);
} else connectWS();

</script>
