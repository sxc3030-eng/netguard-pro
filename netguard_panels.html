<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NetGuard Pro — Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg4:#22222f;
  --border:#ffffff0f;--border2:#ffffff1a;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --blue:#4d9fff;--red:#ff4d6a;--green:#3dffb4;--amber:#ffb347;--purple:#b47dff;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;height:100vh;display:flex;flex-direction:column}
.titlebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;width:100%;box-sizing:border-box}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.off{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;min-height:0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:1}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:500;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:11px;font-family:'Geist Mono',monospace}
th{padding:8px 12px;color:var(--text3);font-weight:500;text-align:left;font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:7px 12px;border-bottom:1px solid #ffffff05}
.threat-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sev{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.sev-high,.sev-critical{background:#3d1220;color:#ff4d6a}
.sev-med{background:#3d2800;color:#ffb347}
.sev-low{background:#1a3a6e;color:#4d9fff}
</style>
</head>
<body>
<div class="titlebar">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:13px;font-weight:600"><span style="background:linear-gradient(90deg,#4d9fff,#b47dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Net</span>Guard Pro</span>
    <span style="font-size:12px;color:var(--text3)" id="panel-name">Panel</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="status-dot" id="dot"></div>
    <span style="font-size:11px;color:var(--text3)" id="conn-status">Connexion…</span>
  </div>
</div>
<div class="content" id="panel-content"></div>

<script>
const WS_URL = 'ws://localhost:8765';
const params = new URLSearchParams(window.location.search);
const panel = params.get('panel') || 'packets';
let ws, lastState = null;

const PANEL_NAMES = {
  packets: 'Flux de paquets live',
  threats: 'Menaces en temps réel',
  pie: 'Pays attaquants',
  topips: 'Top IPs suspectes',
  attacks: 'Types d\'attaques — toutes menaces',
};
document.getElementById('panel-name').textContent = '— ' + (PANEL_NAMES[panel] || panel);
document.title = 'NetGuard — ' + (PANEL_NAMES[panel] || panel);

// Build panel HTML
const content = document.getElementById('panel-content');
if (panel === 'packets') {
  content.innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <span class="card-title">Flux de paquets live</span>
        <div style="display:flex;gap:6px">
          <span id="pkt-count" style="font-size:11px;color:var(--text3)">0 paquets</span>
        </div>
      </div>
      <div style="overflow-x:auto;flex:1">
        <table>
          <thead><tr><th>Heure</th><th>Source IP</th><th>Localisation</th><th>Dest</th><th>Port</th><th>Proto</th><th>Taille</th><th>Statut</th><th>Raison</th></tr></thead>
          <tbody id="pkt-tbody"></tbody>
        </table>
      </div>
    </div>`;
} else if (panel === 'threats') {
  content.innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <span class="card-title">Menaces en temps réel</span>
        <span id="threat-count" style="font-size:11px;color:var(--text3)">0 menaces</span>
      </div>
      <div id="threats-list" style="overflow-y:auto;flex:1"></div>
    </div>`;
} else if (panel === 'pie') {
  content.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Pays attaquants</span>
          <span id="pie-total" style="font-size:11px;color:var(--text3)">0 attaques</span>
        </div>
        <div style="padding:20px;display:flex;justify-content:center;align-items:center">
          <canvas id="geo-pie" width="260" height="260"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Classement détaillé</span></div>
        <div id="pie-legend" style="padding:16px;overflow-y:auto"></div>
      </div>
    </div>`;
} else if (panel === 'attacks') {
  content.innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <span class="card-title">Types d'attaques — toutes menaces bloquées</span>
        <span id="attacks-total" style="font-size:11px;color:var(--text3)">0 menaces</span>
      </div>
      <div style="padding:20px;overflow-y:auto;flex:1" id="attacks-chart"></div>
    </div>`;
} else if (panel === 'topips') {
  content.innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <span class="card-title">Top IPs suspectes</span>
        <span id="ips-count" style="font-size:11px;color:var(--text3)">0 IPs trackées</span>
      </div>
      <div style="padding:20px;overflow-y:auto" id="ips-chart"></div>
    </div>`;
}

// Render functions
function renderPackets(pkts) {
  const tbody = document.getElementById('pkt-tbody');
  if (!tbody || !pkts) return;
  document.getElementById('pkt-count').textContent = pkts.length + ' paquets';
  const sc = {allow:'#3dffb4',block:'#ff4d6a',warn:'#ffb347'};
  tbody.innerHTML = pkts.slice(0,100).map(p => `<tr>
    <td style="color:var(--text3)">${p.t||''}</td>
    <td style="color:${sc[p.status]||'var(--text2)'}">${p.src||''}</td>
    <td style="color:var(--text3);font-size:10px">${p.location||p.country||''}</td>
    <td style="color:var(--text3)">${p.dst||''}</td>
    <td>${p.dport||''}</td>
    <td style="color:var(--blue)">${p.proto||''}</td>
    <td style="color:var(--text3)">${p.size||''}</td>
    <td style="color:${sc[p.status]||'var(--text2)'}">${p.status||''}</td>
    <td style="color:var(--text3);max-width:250px;overflow:hidden;text-overflow:ellipsis">${p.reason||''}</td>
  </tr>`).join('');
}

function renderThreats(threats) {
  const el = document.getElementById('threats-list');
  if (!el || !threats) return;
  document.getElementById('threat-count').textContent = threats.length + ' menaces';
  const sc = {high:'sev-high',med:'sev-med',low:'sev-low',critical:'sev-critical'};
  el.innerHTML = threats.map(t => `
    <div class="threat-item">
      <span class="sev ${sc[t.severity]||'sev-low'}">${t.severity||'?'}</span>
      <span style="font-size:13px;font-weight:500;color:var(--text);min-width:160px">${t.type||''}</span>
      <span style="font-family:'Geist Mono',monospace;font-size:12px;color:var(--text3);min-width:120px">${t.src_ip||''}</span>
      <span style="font-size:12px;color:var(--text3);flex:1">${t.description||''}</span>
      <span style="font-size:10px;color:var(--text3)">${(t.timestamp||'').replace('T',' ').slice(0,19)}</span>
    </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text3)">Aucune menace détectée</div>';
}

function renderPie(hits) {
  if (!hits || !hits.length) return;
  const total = hits.reduce((s,h) => s+h.hits, 0);
  document.getElementById('pie-total').textContent = total.toLocaleString() + ' attaques';

  const canvas = document.getElementById('geo-pie');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 10;
  ctx.clearRect(0,0,W,H);

  const COLORS = ['#ff4d6a','#ffb347','#b47dff','#4d9fff','#3dffb4','#00d4ff','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'];
  const FLAGS = {RU:'🇷🇺',CN:'🇨🇳',KP:'🇰🇵',IR:'🇮🇷',KR:'🇰🇷',BR:'🇧🇷',NG:'🇳🇬',IN:'🇮🇳',US:'🇺🇸',DE:'🇩🇪',FR:'🇫🇷',NL:'🇳🇱'};
  const top = hits.slice(0,10);
  let start = -Math.PI/2;
  top.forEach((h,i) => {
    const slice = (h.hits/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+slice); ctx.closePath();
    ctx.fillStyle = COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='#0f0f13'; ctx.lineWidth=2; ctx.stroke();
    // Label si assez grand
    if (slice > 0.25) {
      const midAngle = start + slice/2;
      const lx = cx + Math.cos(midAngle)*(r*0.7);
      const ly = cy + Math.sin(midAngle)*(r*0.7);
      ctx.fillStyle='#fff'; ctx.font='bold 12px Outfit,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(FLAGS[h.country]||h.country, lx, ly);
    }
    start += slice;
  });
  // Donut hole
  ctx.beginPath(); ctx.arc(cx,cy,r*0.45,0,Math.PI*2);
  ctx.fillStyle='#16161d'; ctx.fill();
  ctx.fillStyle='#e8e8f0'; ctx.font='bold 16px Geist Mono,monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(total.toLocaleString(), cx, cy-8);
  ctx.font='11px Outfit,sans-serif'; ctx.fillStyle='#5a5a72';
  ctx.fillText('attaques', cx, cy+10);

  // Legend
  const legend = document.getElementById('pie-legend');
  if (legend) legend.innerHTML = top.map((h,i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="width:12px;height:12px;border-radius:50%;background:${COLORS[i]};flex-shrink:0;display:inline-block"></span>
      <span style="font-size:16px">${FLAGS[h.country]||'🌍'}</span>
      <span style="color:var(--text2);flex:1">${h.name}</span>
      <span style="font-family:'Geist Mono',monospace;color:${COLORS[i]};font-weight:700;font-size:14px">${h.hits}</span>
      <span style="font-size:11px;color:var(--text3)">${Math.round(h.hits*100/total)}%</span>
    </div>`).join('');
}

const ATTACK_COLORS = {
  'Scan':'#4d9fff','Brute Force':'#ff4d6a','DDoS':'#ffb347',
  'DNS':'#00d4ff','Web':'#b47dff','IDS':'#ff6b9d','Malware':'#ff1a4d',
  'Rate Limit':'#ff7b00','Blacklist':'#c040c0','Honeypot':'#3dffb4',
  'Géoblocage':'#f0a000','Auto-block':'#e05050','Autre':'#5a5a72'
};
const _accum = {};
const _seenIds = new Set();

function _cat(type) {
  const t = (type||'').toLowerCase();
  if (t.includes('scan') || t.includes('port'))          return 'Scan';
  if (t.includes('brute') || t.includes('ssh'))          return 'Brute Force';
  if (t.includes('flood') || t.includes('dos'))          return 'DDoS';
  if (t.includes('dns'))                                  return 'DNS';
  if (t.includes('dpi') || t.includes('sql') || t.includes('xss') || t.includes('web')) return 'Web';
  if (t.includes('ids') || t.includes('suricata'))       return 'IDS';
  if (t.includes('malware') || t.includes('c2'))         return 'Malware';
  if (t.includes('rate'))                                 return 'Rate Limit';
  if (t.includes('blacklist'))                            return 'Blacklist';
  if (t.includes('honeypot'))                             return 'Honeypot';
  if (t.includes('geo'))                                  return 'Géoblocage';
  if (t.includes('auto'))                                 return 'Auto-block';
  return 'Autre';
}

function renderAttacks(threats) {
  if (!threats) return;
  threats.forEach(t => {
    const id = t.id || (t.timestamp + t.src_ip);
    if (_seenIds.has(id)) return;
    _seenIds.add(id);
    const cat = _cat(t.type);
    if (!_accum[cat]) _accum[cat] = {count:0, ips:[]};
    _accum[cat].count++;
    const ip = t.src_ip || '';
    if (ip && !_accum[cat].ips.includes(ip)) {
      _accum[cat].ips.push(ip);
      if (_accum[cat].ips.length > 10) _accum[cat].ips.shift();
    }
  });

  const el = document.getElementById('attacks-chart');
  const total = document.getElementById('attacks-total');
  if (!el) return;

  const entries = Object.entries(_accum).sort((a,b) => b[1].count - a[1].count);
  const grand = entries.reduce((s,[,d])=>s+d.count,0);
  if (total) total.textContent = grand + ' menaces';

  if (!entries.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">En attente de menaces…</div>';
    return;
  }

  const max = entries[0][1].count;
  el.innerHTML = entries.map(([type, data]) => {
    const color = ATTACK_COLORS[type] || '#5a5a72';
    const pct   = Math.round(data.count*100/max);
    const pctTotal = Math.round(data.count*100/grand);
    const ips   = data.ips.slice(-5).reverse();
    return `
      <div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600;color:${color};min-width:110px">${type}</span>
          <div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:.4s"></div>
          </div>
          <span style="font-size:14px;font-weight:700;font-family:'Geist Mono',monospace;color:${color};min-width:36px;text-align:right">${data.count}</span>
          <span style="font-size:11px;color:var(--text3);min-width:32px">${pctTotal}%</span>
        </div>
        <div style="padding-left:120px;display:flex;gap:6px;flex-wrap:wrap">
          ${ips.map(ip => `<span style="font-size:10px;font-family:'Geist Mono',monospace;background:${color}18;color:${color};padding:2px 7px;border-radius:3px">${ip}</span>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderTopIps(ips, blocked) {
  const el = document.getElementById('ips-chart');
  if (!el || !ips || !ips.length) return;
  document.getElementById('ips-count').textContent = ips.length + ' IPs trackées';
  const max = ips[0].hits || 1;
  const COLORS = ['#ff4d6a','#ff4d6a','#ffb347','#ffb347','#4d9fff','#4d9fff','#4d9fff','#4d9fff','#4d9fff','#4d9fff'];
  el.innerHTML = ips.slice(0,20).map((item,i) => {
    const pct = Math.round((item.hits/max)*100);
    const isBlocked = blocked && blocked.includes(item.ip);
    const color = COLORS[i] || 'var(--blue)';
    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:12px;color:var(--text3);width:22px;text-align:right;font-family:'Geist Mono',monospace">${i+1}</span>
        <span style="font-family:'Geist Mono',monospace;font-size:13px;color:var(--text2);min-width:130px">${item.ip}</span>
        <div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:.3s"></div>
        </div>
        <span style="font-size:13px;font-weight:700;font-family:'Geist Mono',monospace;color:${color};min-width:50px;text-align:right">${item.hits} hits</span>
        <span style="font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;${isBlocked?'background:#3d1220;color:#ff4d6a':'background:var(--bg4);color:var(--text3)'}">${isBlocked?'BLOQUÉ':'actif'}</span>
      </div>`;
  }).join('');
}

// WebSocket
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('dot').classList.remove('off');
    document.getElementById('conn-status').textContent = 'Connecté';
    ws.send(JSON.stringify({cmd:'get_state'}));
  };
  ws.onclose = () => {
    document.getElementById('dot').classList.add('off');
    document.getElementById('conn-status').textContent = 'Reconnexion…';
    setTimeout(connect, 3000);
  };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type !== 'state') return;
      if (panel === 'packets') renderPackets(msg.recent_packets);
      else if (panel === 'threats') renderThreats(msg.threats);
      else if (panel === 'pie') renderPie(msg.geo_hits);
      else if (panel === 'topips') renderTopIps(msg.top_ips, msg.blocked_ips);
      else if (panel === 'attacks') renderAttacks(msg.threats);
    } catch(_) {}
  };
  ws.onerror = () => {};
}
connect();
</script>
</body>
</html>
