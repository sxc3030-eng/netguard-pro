<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NetGuard Pro — Carte mondiale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1c1c26;--bg4:#22222f;
  --border:#ffffff0f;--border2:#ffffff1a;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --blue:#4d9fff;--red:#ff4d6a;--green:#3dffb4;--amber:#ffb347;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.titlebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.titlebar-left{display:flex;align-items:center;gap:10px}
.win-btns{display:flex;gap:6px}
.win-btn{width:12px;height:12px;border-radius:50%;cursor:pointer}
.win-btn.close{background:#ff5f57}.win-btn.min{background:#ffbd2e}.win-btn.max{background:#28c840}
.app-icon{width:20px;height:20px;background:linear-gradient(135deg,#4d9fff,#b47dff);border-radius:4px;display:grid;place-items:center}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.off{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.layout{display:flex;flex:1;overflow:hidden}

.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text)}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
.stat-card{background:var(--bg4);border-radius:8px;padding:8px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:600;font-family:'Geist Mono',monospace;line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.c-blue{color:var(--blue)}.c-red{color:var(--red)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}

.country-list{flex:1;overflow-y:auto;padding:0 0 8px}
.country-section{padding:8px 14px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.country-item{display:flex;align-items:center;padding:5px 14px;gap:8px;font-size:12px;transition:.1s;cursor:default}
.country-item:hover{background:var(--bg4)}
.country-flag{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.country-name{flex:1;color:var(--text2)}
.country-bar-wrap{width:50px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.country-bar{height:100%;border-radius:2px}
.country-count{font-family:'Geist Mono',monospace;font-size:11px;min-width:28px;text-align:right}

.log-section{border-top:1px solid var(--border);height:180px;display:flex;flex-direction:column;flex-shrink:0}
.log-header{padding:8px 14px;font-size:11px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0}
.log-feed{overflow-y:auto;flex:1}
.log-item{padding:4px 14px;font-size:10px;font-family:'Geist Mono',monospace;border-bottom:1px solid var(--border)44;display:flex;gap:6px;align-items:center}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--text3);min-width:52px}
.log-ip{min-width:110px}
.log-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.map-area{flex:1;position:relative;overflow:hidden;background:#0a0a10}
#world-map{width:100%;height:100%}

.map-legend{position:absolute;bottom:16px;left:16px;background:var(--bg2)dd;border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;gap:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

.map-info{position:absolute;top:16px;right:16px;background:var(--bg2)dd;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);min-width:180px}
.map-info-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:6px}

.back-btn{background:var(--bg4);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:.15s}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-left">
    <div class="win-btns">
      <div class="win-btn close"></div>
      <div class="win-btn min"></div>
      <div class="win-btn max"></div>
    </div>
    <div class="app-icon">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1L11 4V8L6 11L1 8V4L6 1Z" stroke="white" stroke-width="1.5"/>
        <circle cx="6" cy="6" r="1.5" fill="white"/>
      </svg>
    </div>
    <span style="font-size:13px;font-weight:500">NetGuard Pro — Carte mondiale des connexions</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="status-dot" id="dot"></div>
      <span style="font-size:11px" id="conn-status">Connexion…</span>
    </div>
    <a href="netguard_dashboard.html" class="back-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Dashboard
    </a>
  </div>
</div>

<div class="layout">

  <div class="sidebar">
    <div class="sidebar-header">Statistiques en direct</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val c-blue" id="s-total">0</div><div class="stat-lbl">Connexions</div></div>
      <div class="stat-card"><div class="stat-val c-red" id="s-blocked">0</div><div class="stat-lbl">Bloquées</div></div>
      <div class="stat-card"><div class="stat-val c-amber" id="s-countries">0</div><div class="stat-lbl">Pays détectés</div></div>
      <div class="stat-card"><div class="stat-val c-green" id="s-allowed">0</div><div class="stat-lbl">Permises</div></div>
    </div>

    <div class="country-section">Activité par pays</div>
    <div class="country-list" id="country-list"></div>

    <div class="log-section">
      <div class="log-header">Connexions récentes</div>
      <div class="log-feed" id="log-feed"></div>
    </div>
  </div>

  <div class="map-area">
    <svg id="world-map"></svg>

    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Connexion permise</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Alerte</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Bloquée</div>
    </div>

    <div class="map-info">
      <div class="map-info-title">Pays le plus actif</div>
      <div id="top-country" style="color:var(--amber);font-size:13px;font-weight:500">—</div>
      <div id="top-country-count" style="font-size:11px;color:var(--text3);margin-top:2px">0 connexions</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const WS_URL = 'ws://localhost:8765';
let ws, lastState = null;

// Coordonnées des capitales / centres des pays
const COUNTRY_COORDS = {
  RU:[37.6,55.7], CN:[116.4,39.9], KP:[125.7,39.0], IR:[51.4,35.7],
  KR:[126.9,37.5], BR:[-47.9,-15.8], NG:[7.5,9.1], IN:[77.2,28.6],
  US:[-100.0,40.0], DE:[13.4,52.5], FR:[2.3,48.9], NL:[4.9,52.4],
  GB:[-0.1,51.5], CA:[-75.7,45.4], AU:[151.2,-33.9], JP:[139.7,35.7],
  IT:[12.5,41.9], ES:[-3.7,40.4], UA:[30.5,50.4], PL:[21.0,52.2],
  TR:[32.9,39.9], SA:[46.7,24.7], AR:[-58.4,-34.6], ZA:[28.0,-26.2],
  MX:[-99.1,19.4], ID:[106.8,-6.2], PK:[73.0,33.7], BD:[90.4,23.7],
  NL:[4.9,52.4], SE:[18.1,59.3], NO:[10.7,59.9], FI:[25.0,60.2],
  CH:[7.4,46.9], BE:[4.4,50.8], PT:[-9.1,38.7], CZ:[14.4,50.1],
  RO:[26.1,44.4], HU:[19.0,47.5], GR:[23.7,37.9], BG:[23.3,42.7],
  RS:[20.5,44.8], HR:[16.0,45.8], SK:[17.1,48.1], SG:[103.8,1.4],
  HK:[114.2,22.3], TW:[121.5,25.0], TH:[100.5,13.7], VN:[105.8,21.0],
  MY:[101.7,3.1], PH:[121.0,14.6], NZ:[174.8,-36.9], EG:[31.2,30.1],
  MA:[7.1,34.0], DZ:[3.0,36.8], KE:[-1.3,-36.8], ET:[38.7,9.0],
  GH:[-0.2,5.6], SN:[-14.7,14.7], CI:[-5.6,5.3], TZ:[39.3,-6.4],
  IL:[35.2,31.8], AE:[55.3,25.2], QA:[51.5,25.3], KW:[47.9,29.4],
  IQ:[44.4,33.3], SY:[36.3,33.5], LB:[35.5,33.9], JO:[35.9,31.9],
  UZ:[69.3,41.3], KZ:[71.4,51.2], BY:[27.6,53.9], MD:[28.9,47.0],
  LT:[25.3,54.7], LV:[24.1,56.9], EE:[24.7,59.4], CL:[-70.7,-33.5],
  CO:[-74.1,4.7], VE:[-66.9,10.5], PE:[-77.0,-12.1], EC:[-78.5,-0.2],
  BO:[-68.1,-16.5], PY:[-57.6,-25.3], UY:[-56.2,-34.9],
};

const GEO_COUNTRY_NAMES = {
  RU:'Russie', CN:'Chine', KP:'Corée du Nord', IR:'Iran',
  KR:'Corée du Sud', BR:'Brésil', NG:'Nigeria', IN:'Inde',
  US:'États-Unis', DE:'Allemagne', FR:'France', NL:'Pays-Bas',
  GB:'Royaume-Uni', CA:'Canada', AU:'Australie', JP:'Japon',
  IT:'Italie', ES:'Espagne', UA:'Ukraine', PL:'Pologne',
  TR:'Turquie', SA:'Arabie Saoudite', SG:'Singapour', HK:'Hong Kong',
};

const FLAGS = {
  RU:'🇷🇺',CN:'🇨🇳',KP:'🇰🇵',IR:'🇮🇷',KR:'🇰🇷',BR:'🇧🇷',NG:'🇳🇬',IN:'🇮🇳',
  US:'🇺🇸',DE:'🇩🇪',FR:'🇫🇷',NL:'🇳🇱',GB:'🇬🇧',CA:'🇨🇦',AU:'🇦🇺',JP:'🇯🇵',
  IT:'🇮🇹',ES:'🇪🇸',UA:'🇺🇦',PL:'🇵🇱',TR:'🇹🇷',SA:'🇸🇦',SG:'🇸🇬',HK:'🇭🇰',
};

// Country stats
let countryStats = {};
let totalConn = 0, blockedConn = 0;
let mapReady = false;
let projection, svg, g;

// ── D3 Map Setup ──────────────────────────────────────────────────────────
async function initMap() {
  const container = document.getElementById('world-map');
  const W = container.parentElement.clientWidth;
  const H = container.parentElement.clientHeight;

  svg = d3.select('#world-map')
    .attr('width', W)
    .attr('height', H);

  projection = d3.geoNaturalEarth1()
    .scale(W / 6.5)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);

  g = svg.append('g');

  // Fetch world topology
  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries = topojson.feature(world, world.objects.countries);

    g.append('g').attr('class','countries')
      .selectAll('path')
      .data(countries.features)
      .join('path')
      .attr('d', path)
      .attr('fill', '#1a1a28')
      .attr('stroke', '#2a2a3a')
      .attr('stroke-width', 0.5);

    // Graticule
    const graticule = d3.geoGraticule()();
    g.append('path')
      .datum(graticule)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', '#ffffff06')
      .attr('stroke-width', 0.5);

    mapReady = true;
    document.getElementById('conn-status').textContent = 'Carte chargée — connexion backend…';

    // Resize handler
    window.addEventListener('resize', () => {
      const nW = container.parentElement.clientWidth;
      const nH = container.parentElement.clientHeight;
      svg.attr('width', nW).attr('height', nH);
      projection.scale(nW / 6.5).translate([nW / 2, nH / 2]);
      g.selectAll('path').attr('d', path);
    });

  } catch(e) {
    console.error('Map load error:', e);
    svg.append('text')
      .attr('x','50%').attr('y','50%')
      .attr('text-anchor','middle')
      .attr('fill','#5a5a72')
      .attr('font-size','14px')
      .text('Carte non disponible — vérifie ta connexion internet');
  }

  connectWS();
}

// ── Point sur la carte ────────────────────────────────────────────────────
function addMapPoint(country, status) {
  if (!mapReady || !projection) return;
  const coords = COUNTRY_COORDS[country];
  if (!coords) return;

  const [px, py] = projection(coords);
  const color = status === 'block' ? '#ff4d6a' : status === 'warn' ? '#ffb347' : '#3dffb4';
  const r = status === 'block' ? 5 : 4;

  // Ripple
  const ripple = g.append('circle')
    .attr('cx', px).attr('cy', py)
    .attr('r', r)
    .attr('fill', 'none')
    .attr('stroke', color)
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.8);

  ripple.transition().duration(1200)
    .attr('r', r + 12)
    .attr('opacity', 0)
    .remove();

  // Dot persistant (s'estompe après 8s)
  const dot = g.append('circle')
    .attr('cx', px).attr('cy', py)
    .attr('r', status === 'block' ? 3 : 2)
    .attr('fill', color)
    .attr('opacity', 0.9);

  dot.transition().delay(5000).duration(3000)
    .attr('opacity', 0.15);
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function updateSidebar() {
  document.getElementById('s-total').textContent = totalConn.toLocaleString();
  document.getElementById('s-blocked').textContent = blockedConn.toLocaleString();
  document.getElementById('s-allowed').textContent = (totalConn - blockedConn).toLocaleString();

  const sorted = Object.entries(countryStats).sort((a,b) => b[1].total - a[1].total);
  document.getElementById('s-countries').textContent = sorted.length;

  // Top country
  if (sorted.length > 0) {
    const [top, data] = sorted[0];
    const name = GEO_COUNTRY_NAMES[top] || top;
    const flag = FLAGS[top] || '🌍';
    document.getElementById('top-country').textContent = flag + ' ' + name;
    document.getElementById('top-country-count').textContent = data.total + ' connexions';
  }

  // Country list
  const maxVal = sorted.length ? sorted[0][1].total : 1;
  const el = document.getElementById('country-list');
  el.innerHTML = sorted.slice(0, 20).map(([code, data]) => {
    const name = GEO_COUNTRY_NAMES[code] || code;
    const flag = FLAGS[code] || '🌍';
    const pct = Math.round(data.total * 100 / maxVal);
    const color = data.blocked > data.total * 0.5 ? 'var(--red)' : data.blocked > 0 ? 'var(--amber)' : 'var(--green)';
    return `<div class="country-item">
      <span class="country-flag">${flag}</span>
      <span class="country-name">${name}</span>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${pct}%;background:${color}"></div></div>
      <span class="country-count" style="color:${color}">${data.total}</span>
    </div>`;
  }).join('') || '<div style="padding:12px 14px;font-size:11px;color:var(--text3)">Aucune donnée</div>';
}

function addLogEntry(pkt, country) {
  const feed = document.getElementById('log-feed');
  if (!feed) return;
  const color = pkt.status === 'block' ? 'var(--red)' : pkt.status === 'warn' ? 'var(--amber)' : 'var(--green)';
  const flag = country ? (FLAGS[country] || '🌍') : '🏠';
  const div = document.createElement('div');
  div.className = 'log-item';
  div.innerHTML = `
    <div class="log-dot" style="background:${color}"></div>
    <span class="log-time">${pkt.t||''}</span>
    <span class="log-ip" style="color:${color}">${pkt.src||''}</span>
    <span style="font-size:11px">${flag}</span>`;
  feed.insertBefore(div, feed.firstChild);
  while (feed.children.length > 40) feed.removeChild(feed.lastChild);
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('dot').classList.remove('off');
    document.getElementById('conn-status').textContent = 'Connecté — En direct';
  };
  ws.onclose = () => {
    document.getElementById('dot').classList.add('off');
    document.getElementById('conn-status').textContent = 'Backend déconnecté…';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); } catch(_) {}
  };
}

let lastPacketCount = 0;

function handleMsg(msg) {
  if (msg.type !== 'state') return;
  const pkts = msg.recent_packets || [];

  // Traite seulement les nouveaux paquets
  const newPkts = pkts.slice(0, Math.max(0, pkts.length - lastPacketCount + 5));
  lastPacketCount = pkts.length;

  newPkts.forEach(pkt => {
    // Déterminer le pays (depuis l'état ou la table de géo)
    const country = guessCountry(pkt.src);
    if (!country) return; // IP privée, on skip

    totalConn++;
    if (pkt.status === 'block') blockedConn++;

    if (!countryStats[country]) countryStats[country] = {total:0, blocked:0};
    countryStats[country].total++;
    if (pkt.status === 'block') countryStats[country].blocked++;

    addMapPoint(country, pkt.status);
    addLogEntry(pkt, country);
  });

  updateSidebar();
}

// Géolocalisation simplifiée basée sur les plages IP
const GEO_SIMPLE = [
  ['RU',[[5,8],[5,44],[37,9],[46,8],[77,37],[80,73],[81,162],[82,138],[83,149],[84,201],[85,90],[87,226],[89,111],[91,108],[92,53],[93,153],[94,25],[95,165],[109,86],[176,14],[178,140],[185,71],[193,232],[194,8],[195,2],[212,42],[213,24]]],
  ['CN',[[1,0],[27,0],[36,0],[39,0],[42,0],[49,0],[58,0],[60,0],[61,0],[101,0],[106,0],[110,0],[112,0],[114,0],[115,0],[116,0],[120,0],[124,0],[163,0],[171,0],[175,0],[180,0],[182,0],[183,0],[202,0],[210,0],[218,0],[220,0],[223,0]]],
  ['KP',[[175,45],[210,52]]],
  ['IR',[[2,144],[5,22],[31,2],[37,98],[46,100],[62,60],[78,39],[80,71],[82,99],[85,133],[87,107],[89,32],[91,98],[94,182],[95,38],[109,120],[176,65],[188,136],[194,225],[195,146]]],
  ['KR',[[1,16],[1,176],[14,0],[27,96],[49,142],[58,120],[112,144],[119,64],[121,128],[122,32],[125,128],[175,192],[203,226],[210,94],[211,36]]],
  ['BR',[[177,0],[179,0],[186,192],[189,0],[200,128],[201,0]]],
  ['NG',[[41,58],[41,184],[105,112],[154,120],[197,210],[197,242]]],
  ['IN',[[1,6],[14,96],[27,4],[43,224],[45,112],[49,32],[59,88],[103,0],[106,64],[115,240],[117,192],[119,224],[122,160],[123,136],[124,120],[180,64],[182,64],[202,56],[210,212]]],
  ['US',[[3,0],[4,0],[8,0],[12,0],[13,0],[15,0],[16,0],[17,0],[18,0],[20,0],[23,0],[24,0],[34,0],[35,0],[40,0],[44,0],[45,0],[47,0],[50,0],[52,0],[54,0],[63,0],[64,0],[65,0],[66,0],[67,0],[68,0],[98,0],[104,0],[107,0]]],
  ['DE',[[5,1],[46,4],[78,42],[80,154],[81,169],[82,113],[84,44],[85,14],[87,77],[89,0],[91,65],[94,130],[213,160]]],
  ['FR',[[2,0],[37,187],[46,105],[51,77],[77,136],[78,192],[82,64],[83,200],[86,192],[88,120],[90,0],[109,0],[176,139],[178,116],[185,15]]],
  ['NL',[[5,57],[31,3],[31,6],[37,19],[45,14],[46,19],[77,243],[80,65],[82,94],[84,22],[85,17],[87,213],[89,188],[91,194],[94,75],[95,211],[185,220]]],
  ['GB',[[5,61],[25,0],[31,22],[51,0],[62,24],[78,105],[81,128],[82,132],[84,12],[85,115],[86,128],[89,240],[92,0],[94,0],[212,58]]],
  ['JP',[[1,0],[27,80],[43,0],[49,96],[58,64],[59,128],[60,128],[61,196],[103,0],[106,128],[110,128],[111,64],[112,0],[113,0],[114,128],[115,144],[116,64],[117,128],[118,0],[119,0],[122,0],[123,0],[124,0],[125,0],[126,0],[210,128],[211,0],[218,224]]],
];

const _geoCache = {};
function guessCountry(ip) {
  if (!ip) return null;
  if (_geoCache[ip] !== undefined) return _geoCache[ip];
  const parts = ip.split('.').map(Number);
  if (!parts[0]) { _geoCache[ip] = null; return null; }
  // Skip private
  if (parts[0]===10||parts[0]===127||(parts[0]===192&&parts[1]===168)||(parts[0]===172&&parts[1]>=16&&parts[1]<=31)) {
    _geoCache[ip] = null; return null;
  }
  for (const [code, ranges] of GEO_SIMPLE) {
    for (const [a, b] of ranges) {
      if (parts[0] === a && (b === 0 || parts[1] === b)) {
        _geoCache[ip] = code; return code;
      }
    }
  }
  _geoCache[ip] = null;
  return null;
}

// Lang sync
function setLang(l) {
  localStorage.setItem('ng_lang', l);
  ['fr','en','es','de'].forEach(code => {
    const btn = document.getElementById('lb-'+code);
    if (!btn) return;
    btn.style.background = code===l ? '#1a3a6e' : 'transparent';
    btn.style.color = code===l ? '#4d9fff' : '#5a5a72';
    btn.style.borderColor = code===l ? '#4d9fff' : 'rgba(255,255,255,0.1)';
  });
}
const _initLang = localStorage.getItem('ng_lang') || 'fr';
setLang(_initLang);

// Start
initMap();
</script>
