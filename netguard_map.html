<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NetGuard Pro — Carte mondiale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg4:#22222f;
  --border:#ffffff0f;--border2:#ffffff1a;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --blue:#4d9fff;--red:#ff4d6a;--green:#3dffb4;--amber:#ffb347;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.titlebar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.off{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.map-area{flex:1;position:relative;overflow:hidden;background:#07070d}
#world-map{width:100%;height:100%}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
.stat-card{background:var(--bg4);border-radius:8px;padding:8px 10px;text-align:center}
.stat-val{font-size:20px;font-weight:600;font-family:'Geist Mono',monospace;line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.c-blue{color:var(--blue)}.c-red{color:var(--red)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}

.section-title{padding:8px 14px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.country-list{overflow-y:auto;flex:1;padding-bottom:8px}
.country-item{display:flex;align-items:center;padding:6px 14px;gap:8px;font-size:12px;cursor:default}
.country-item:hover{background:var(--bg4)}
.bar-wrap{width:50px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}

.log-section{border-top:1px solid var(--border);height:200px;display:flex;flex-direction:column;flex-shrink:0}
.log-header{padding:8px 14px;font-size:11px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0}
.log-feed{overflow-y:auto;flex:1}
.log-item{padding:5px 14px;font-size:10px;font-family:'Geist Mono',monospace;border-bottom:1px solid var(--border)22;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.log-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Tooltip */
#map-tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;z-index:100;display:none;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#map-tooltip .tt-ip{font-family:'Geist Mono',monospace;color:var(--blue);font-size:13px;font-weight:600;margin-bottom:4px}
#map-tooltip .tt-loc{color:var(--text2);margin-bottom:2px}
#map-tooltip .tt-type{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;display:inline-block;margin-top:4px}

.map-legend{position:absolute;bottom:16px;left:270px;background:var(--bg2)dd;border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;gap:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

.map-info{position:absolute;top:16px;right:16px;background:var(--bg2)dd;border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:11px;color:var(--text2);min-width:200px}
.btn-back{background:var(--bg4);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:.15s}
.btn-back:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>

<div id="map-tooltip">
  <div class="tt-ip" id="tt-ip"></div>
  <div class="tt-loc" id="tt-loc"></div>
  <div class="tt-loc" id="tt-proto"></div>
  <span class="tt-type" id="tt-type"></span>
</div>

<div class="titlebar">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:13px;font-weight:600">
      <span style="background:linear-gradient(90deg,#4d9fff,#b47dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Net</span><span>Guard</span> <span style="color:var(--text3);font-weight:400">Pro</span>
    </span>
    <span style="font-size:11px;color:var(--text3)">— Carte mondiale des connexions</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="status-dot" id="dot"></div>
      <span style="font-size:11px" id="conn-status">Connexion…</span>
    </div>
    <a href="netguard_dashboard.html" class="btn-back">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Dashboard
    </a>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-val c-blue" id="s-total">0</div><div class="stat-lbl">Connexions</div></div>
      <div class="stat-card"><div class="stat-val c-red" id="s-blocked">0</div><div class="stat-lbl">Bloquées</div></div>
      <div class="stat-card"><div class="stat-val c-amber" id="s-countries">0</div><div class="stat-lbl">Pays</div></div>
      <div class="stat-card"><div class="stat-val c-green" id="s-cities">0</div><div class="stat-lbl">Villes</div></div>
    </div>

    <div class="section-title">Activité par pays</div>
    <div class="country-list" id="country-list"></div>

    <div class="log-section">
      <div class="log-header">Connexions récentes</div>
      <div class="log-feed" id="log-feed"></div>
    </div>
  </div>

  <div class="map-area">
    <svg id="world-map"></svg>

    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Permise</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Alerte</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Bloquée</div>
    </div>

    <div class="map-info">
      <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:6px">Pays le plus actif</div>
      <div id="top-country" style="color:var(--amber);font-size:14px;font-weight:600">—</div>
      <div id="top-country-count" style="font-size:11px;color:var(--text3);margin-top:2px">0 connexions</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const WS_URL = 'ws://localhost:8765';
let ws, mapReady = false, projection, svg, g, path;
let totalConn = 0, blockedConn = 0;
let countryStats = {}, cityStats = {}, cityCoords = {};
let lastPktCount = 0;

const FLAGS = {RU:'🇷🇺',CN:'🇨🇳',KP:'🇰🇵',IR:'🇮🇷',KR:'🇰🇷',BR:'🇧🇷',NG:'🇳🇬',IN:'🇮🇳',US:'🇺🇸',DE:'🇩🇪',FR:'🇫🇷',NL:'🇳🇱',GB:'🇬🇧',JP:'🇯🇵',CA:'🇨🇦',AU:'🇦🇺'};
const COUNTRY_NAMES = {RU:'Russie',CN:'Chine',KP:'Corée du Nord',IR:'Iran',KR:'Corée du Sud',BR:'Brésil',NG:'Nigeria',IN:'Inde',US:'États-Unis',DE:'Allemagne',FR:'France',NL:'Pays-Bas',GB:'Royaume-Uni',JP:'Japon',CA:'Canada',AU:'Australie'};

// Coords de villes majeures connues pour les IPs sans géoloc API
const KNOWN_CITY_COORDS = {
  // Russie
  'Moscow':[37.6,55.75],'Saint Petersburg':[30.3,59.95],'Novosibirsk':[82.9,55.0],'Yekaterinburg':[60.6,56.85],
  // Chine
  'Beijing':[116.4,39.9],'Shanghai':[121.5,31.2],'Shenzhen':[114.1,22.5],'Guangzhou':[113.3,23.1],'Chengdu':[104.1,30.6],
  // USA
  'New York':[-74.0,40.7],'Los Angeles':[-118.2,34.05],'Chicago':[-87.6,41.85],'Houston':[-95.4,29.75],'Phoenix':[-112.0,33.45],
  'Seattle':[-122.3,47.6],'San Francisco':[-122.4,37.75],'Dallas':[-96.8,32.8],'Miami':[-80.2,25.75],'Boston':[-71.1,42.35],
  // Allemagne
  'Berlin':[13.4,52.5],'Frankfurt':[8.7,50.1],'Munich':[11.6,48.1],'Hamburg':[10.0,53.55],
  // France
  'Paris':[2.35,48.85],'Lyon':[4.85,45.75],'Marseille':[5.4,43.3],
  // Inde
  'Mumbai':[72.85,19.0],'Delhi':[77.2,28.65],'Bangalore':[77.6,12.95],'Chennai':[80.25,13.1],
  // Pays-Bas
  'Amsterdam':[4.9,52.37],'Rotterdam':[4.45,51.9],
  // Brésil
  'São Paulo':[-46.6,-23.55],'Rio de Janeiro':[-43.2,-22.9],
  // Iran
  'Tehran':[51.4,35.7],'Mashhad':[59.6,36.3],
  // Corée du Nord
  'Pyongyang':[125.75,39.0],
  // Japon
  'Tokyo':[139.7,35.7],'Osaka':[135.5,34.65],
  // UK
  'London':[-0.12,51.5],'Manchester':[-2.25,53.5],
};

// Cache IP → {city, country, lat, lon}
const ipGeoCache = {};

async function fetchCityCoords(ip) {
  if (ipGeoCache[ip]) return ipGeoCache[ip];
  // Use data from packet if available (backend sends location)
  return null;
}

async function initMap() {
  const container = document.getElementById('world-map');
  const W = container.parentElement.clientWidth;
  const H = container.parentElement.clientHeight;

  svg = d3.select('#world-map').attr('width', W).attr('height', H);
  projection = d3.geoNaturalEarth1().scale(W/6.2).translate([W/2, H/2]);
  path = d3.geoPath().projection(projection);
  g = svg.append('g');

  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries = topojson.feature(world, world.objects.countries);

    // Fond océan
    svg.insert('rect','g').attr('width',W).attr('height',H).attr('fill','#07070d');

    // Pays
    g.append('g').selectAll('path')
      .data(countries.features)
      .join('path')
      .attr('d', path)
      .attr('fill','#12121e')
      .attr('stroke','#1e1e30')
      .attr('stroke-width',0.6);

    // Graticule subtil
    const graticule = d3.geoGraticule()();
    g.append('path').datum(graticule).attr('d',path)
      .attr('fill','none').attr('stroke','#ffffff04').attr('stroke-width',0.5);

    mapReady = true;
    document.getElementById('conn-status').textContent = 'Carte chargée — connexion backend…';

    window.addEventListener('resize', () => {
      const nW = container.parentElement.clientWidth;
      const nH = container.parentElement.clientHeight;
      svg.attr('width',nW).attr('height',nH);
      projection.scale(nW/6.2).translate([nW/2,nH/2]);
      g.selectAll('path').attr('d',path);
    });

  } catch(e) {
    console.error('Map error:', e);
  }
  connectWS();
}

// ── Ajouter un point précis sur la carte ──────────────────────────────────
function addPoint(lon, lat, status, ip, city, country, proto) {
  if (!mapReady || lon == null || lat == null) return;
  const [px, py] = projection([lon, lat]);
  if (!px || !py || px < 0 || py < 0) return;

  const color = status==='block' ? '#ff4d6a' : status==='warn' ? '#ffb347' : '#3dffb4';
  const r = status==='block' ? 5 : 3;

  // Ripple animé
  const ripple = g.append('circle')
    .attr('cx',px).attr('cy',py).attr('r',r)
    .attr('fill','none').attr('stroke',color).attr('stroke-width',1.5).attr('opacity',.8);
  ripple.transition().duration(1000).attr('r',r+14).attr('opacity',0).remove();

  // Point persistant avec tooltip
  const dot = g.append('circle')
    .attr('cx',px).attr('cy',py)
    .attr('r', status==='block' ? 3.5 : 2.5)
    .attr('fill',color).attr('opacity',.9)
    .style('cursor','pointer')
    .on('mouseover', function(event) {
      const tt = document.getElementById('map-tooltip');
      document.getElementById('tt-ip').textContent = ip;
      document.getElementById('tt-loc').textContent = city ? `📍 ${city}, ${COUNTRY_NAMES[country]||country}` : `🌍 ${COUNTRY_NAMES[country]||country||'Inconnu'}`;
      document.getElementById('tt-proto').textContent = proto ? `Proto: ${proto}` : '';
      const el = document.getElementById('tt-type');
      el.textContent = status==='block' ? '🚫 BLOQUÉ' : status==='warn' ? '⚠ ALERTE' : '✓ PERMIS';
      el.style.background = status==='block' ? '#3d1220' : status==='warn' ? '#3d2800' : '#0d3326';
      el.style.color = color;
      tt.style.display = 'block';
      tt.style.left = (event.clientX + 12) + 'px';
      tt.style.top  = (event.clientY - 10) + 'px';
    })
    .on('mousemove', function(event) {
      document.getElementById('map-tooltip').style.left = (event.clientX + 12) + 'px';
      document.getElementById('map-tooltip').style.top  = (event.clientY - 10) + 'px';
    })
    .on('mouseout', function() {
      document.getElementById('map-tooltip').style.display = 'none';
    });

  dot.transition().delay(6000).duration(3000).attr('opacity',.12);
}

// ── Géolocalisation depuis le paquet ou cache ─────────────────────────────
function getCoords(pkt) {
  // Si le backend a envoyé des coords (via ipapi.co)
  if (pkt.lat != null && pkt.lon != null) return [pkt.lon, pkt.lat];

  // Si on a une ville connue
  const city = pkt.city || '';
  if (city && KNOWN_CITY_COORDS[city]) return KNOWN_CITY_COORDS[city];

  // Coords par pays (fallback)
  const COUNTRY_COORDS = {
    RU:[37.6,55.75],CN:[116.4,39.9],KP:[125.75,39.0],IR:[51.4,35.7],
    KR:[126.9,37.5],BR:[-47.9,-15.8],NG:[7.5,9.1],IN:[77.2,28.6],
    US:[-98.0,39.5],DE:[13.4,52.5],FR:[2.35,48.85],NL:[4.9,52.37],
    GB:[-0.12,51.5],JP:[139.7,35.7],CA:[-96.8,56.1],AU:[133.8,-25.3],
    UA:[30.5,50.4],PL:[21.0,52.2],TR:[32.9,39.9],SA:[46.7,24.7],
    SG:[103.8,1.35],HK:[114.2,22.3],TW:[121.5,25.05],
  };
  const country = pkt.country || guessCountry(pkt.src);
  if (country && COUNTRY_COORDS[country]) {
    // Léger offset aléatoire pour éviter la superposition
    const [lon,lat] = COUNTRY_COORDS[country];
    return [lon + (Math.random()-0.5)*4, lat + (Math.random()-0.5)*3];
  }
  return null;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function updateSidebar() {
  document.getElementById('s-total').textContent = totalConn.toLocaleString();
  document.getElementById('s-blocked').textContent = blockedConn.toLocaleString();
  const sorted = Object.entries(countryStats).sort((a,b)=>b[1].total-a[1].total);
  document.getElementById('s-countries').textContent = sorted.length;
  document.getElementById('s-cities').textContent = Object.keys(cityStats).length;

  if (sorted.length) {
    const [top, data] = sorted[0];
    document.getElementById('top-country').textContent = (FLAGS[top]||'🌍') + ' ' + (COUNTRY_NAMES[top]||top);
    document.getElementById('top-country-count').textContent = data.total + ' connexions';
  }

  const maxVal = sorted.length ? sorted[0][1].total : 1;
  document.getElementById('country-list').innerHTML = sorted.slice(0,15).map(([code,data]) => {
    const pct = Math.round(data.total*100/maxVal);
    const color = data.blocked > data.total*.5 ? 'var(--red)' : data.blocked > 0 ? 'var(--amber)' : 'var(--green)';
    return `<div class="country-item">
      <span style="font-size:14px">${FLAGS[code]||'🌍'}</span>
      <span style="flex:1;color:var(--text2)">${COUNTRY_NAMES[code]||code}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span style="font-family:'Geist Mono',monospace;font-size:11px;color:${color};min-width:28px;text-align:right">${data.total}</span>
    </div>`;
  }).join('') || '<div style="padding:12px 14px;font-size:11px;color:var(--text3)">Aucune donnée</div>';
}

function addLogEntry(pkt, country, city) {
  const feed = document.getElementById('log-feed');
  if (!feed) return;
  const color = pkt.status==='block' ? 'var(--red)' : pkt.status==='warn' ? 'var(--amber)' : 'var(--green)';
  const loc = city ? `${city}` : (COUNTRY_NAMES[country]||country||'');
  const div = document.createElement('div');
  div.className = 'log-item';
  div.innerHTML = `
    <div class="log-dot" style="background:${color}"></div>
    <span style="color:var(--text3);min-width:52px">${pkt.t||''}</span>
    <span style="font-family:'Geist Mono',monospace;color:${color};min-width:100px">${pkt.src||''}</span>
    <span style="color:var(--text3);font-size:9px">${FLAGS[country]||''} ${loc}</span>`;
  feed.insertBefore(div, feed.firstChild);
  while (feed.children.length > 50) feed.removeChild(feed.lastChild);
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('dot').classList.remove('off');
    document.getElementById('conn-status').textContent = 'Connecté — En direct';
  };
  ws.onclose = () => {
    document.getElementById('dot').classList.add('off');
    document.getElementById('conn-status').textContent = 'Backend déconnecté…';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(_){} };
}

function handleMsg(msg) {
  if (msg.type !== 'state') return;
  const pkts = msg.recent_packets || [];
  const newPkts = pkts.slice(0, Math.max(0, pkts.length - lastPktCount + 8));
  lastPktCount = pkts.length;

  newPkts.forEach(pkt => {
    const country = pkt.country || guessCountry(pkt.src);
    if (!country && !pkt.location) return;

    const city = pkt.city || (pkt.location ? pkt.location.split(',')[0].trim() : '');
    const coords = getCoords(pkt);

    totalConn++;
    if (pkt.status === 'block') blockedConn++;

    if (country) {
      if (!countryStats[country]) countryStats[country] = {total:0, blocked:0};
      countryStats[country].total++;
      if (pkt.status === 'block') countryStats[country].blocked++;
    }

    if (city) {
      cityStats[city] = (cityStats[city] || 0) + 1;
    }

    if (coords) addPoint(coords[0], coords[1], pkt.status, pkt.src, city, country, pkt.proto);
    addLogEntry(pkt, country, city);
  });

  updateSidebar();
}

// ── Géolocalisation IP simplifiée ─────────────────────────────────────────
