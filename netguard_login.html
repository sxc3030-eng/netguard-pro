<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NetGuard Pro — Connexion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--bg2:#16161d;--bg4:#22222f;--border:#ffffff0f;--border2:#ffffff1a;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--blue:#4d9fff;--bluedim:#1a3a6e;--red:#ff4d6a;--reddim:#3d1220;--green:#3dffb4}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}

.card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:40px 44px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:32px}
.logo-title{font-size:24px;font-weight:600;letter-spacing:-.01em}
.logo-title span{background:linear-gradient(90deg,#4d9fff,#b47dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:var(--text3);margin-top:5px;letter-spacing:.05em}

.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:11px 14px;border-radius:8px;font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:.15s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bluedim)}
.field input::placeholder{color:var(--text3)}

.btn{width:100%;background:linear-gradient(135deg,var(--blue),#3a7bdd);color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:.15s;margin-top:4px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(77,159,255,.3)}
.btn:active{transform:none}

.error{background:var(--reddim);border:1px solid #ff4d6a33;color:var(--red);padding:11px 14px;border-radius:8px;font-size:12px;margin-bottom:18px;display:none;align-items:center;gap:8px}
.error::before{content:"⚠";font-size:14px}

.footer{text-align:center;font-size:11px;color:var(--text3);margin-top:24px}
.version{font-size:11px;color:var(--text3)}

.loading .btn{opacity:.7;cursor:wait}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;margin:0 auto}
.loading .spinner{display:block}
.loading .btn-text{display:none}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-title" style="display:flex;align-items:center;justify-content:center;gap:10px"><svg viewBox="0 0 200 200" width="40" height="40" style="flex-shrink:0"><defs><linearGradient id="ngG2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4d9fff"/><stop offset="100%" stop-color="#b47dff"/></linearGradient></defs><path d="M100 18L162 42V100C162 140 132 163 100 178C68 163 38 140 38 100V42Z" fill="#16161d" stroke="url(#ngG2)" stroke-width="3"/><path d="M72 70V130M72 70L128 130M128 70V130" stroke="url(#ngG2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><span><span>Net</span>Guard Pro</span></div>
    <div class="logo-sub">Cybersécurité avancée — Accès sécurisé</div>
  </div>

  <div class="error" id="err">Identifiants incorrects</div>

  <form id="login-form" onsubmit="login(event)">
    <div class="field">
      <label>Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="login-btn">
      <span class="btn-text">Se connecter →</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer">
    NetGuard Pro v3.0 — Compte par défaut: <code style="color:var(--blue)">admin</code> / <code style="color:var(--blue)">netguard2024</code>
    <div style="margin-top:8px" id="https-status"></div>
  </div>
</div>

<div class="version">NetGuard Pro v3.0.0 — Protection réseau avancée</div>

<script>
// Vérifier si déjà connecté
// Check HTTPS availability
getAuthURL && getAuthURL().then(url => {
  const el = document.getElementById('https-status');
  if (el) el.innerHTML = url.startsWith('https')
    ? '<span style="color:#3dffb4">🔒 Connexion HTTPS sécurisée</span>'
    : '<span style="color:#ffb347">⚠ Connexion HTTP — HTTPS non disponible</span>';
});
const token = localStorage.getItem('ng_token');
if (token) {
  fetch('http://localhost:8080/auth/verify', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({token})
  }).then(r => r.json()).then(d => {
    if (d.ok) window.location.href = 'netguard_dashboard.html';
  }).catch(() => {});
}

// Detect if HTTPS is available
async function getAuthURL() {
  try {
    const r = await fetch('https://localhost:8443/auth/verify', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}',signal:AbortSignal.timeout(1000)});
    return 'https://localhost:8443';
  } catch(e) { return 'http://localhost:8080'; }
}

async function login(e) {
  e.preventDefault();
  const btn  = document.getElementById('login-btn');
  const form = document.getElementById('login-form');
  const err  = document.getElementById('err');
  err.style.display = 'none';
  form.classList.add('loading');
  btn.disabled = true;

  const baseURL = await getAuthURL();
  localStorage.setItem('ng_auth_url', baseURL);

  try {
    const r = await fetch(baseURL + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      })
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('ng_token', d.token);
      localStorage.setItem('ng_user',  d.user);
      localStorage.setItem('ng_role',  d.role);
      localStorage.setItem('ng_name',  d.name || d.user);
      window.location.href = 'netguard_dashboard.html';
    } else {
      err.style.display = 'flex';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch(ex) {
    err.textContent = '⚠ Impossible de contacter le backend (port 8080)';
    err.style.display = 'flex';
  }
  form.classList.remove('loading');
  btn.disabled = false;
}
</script>
</body>
</html>
